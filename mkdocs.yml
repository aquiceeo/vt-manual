  - konfiguracja.md
  - podstawy.md
  - struktura_dowodzenia.md
  - formacje.md
  - Role:
      - pl.md
      - sl.md
      - tl.md
      - medic.md
      # - sniper.md
      # - JTAC-heli.md
  - Radio:
      - radio.md
      - raporty.md
  - Dodatkowe:
      - dodatkowe.md
